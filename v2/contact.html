<!DOCTYPE html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style/style.css">
        <script src="script/script.js" defer></script>
        <title>Undiana Fadilah | Contact</title>
    </head>
    <body>
        <div class="container">
            <div class="contact__container">
                <div class="box">
                    <div class="box__profile">
                        <div class="box__profile__image">
                            <img src="images/profile.jpeg" alt>
                        </div>
                        <div class="box__profile__self">
                            <h4>Undiana Fadilah</h4>
                            <p>- Fullstack Web Developer</p>
                        </div>
                    </div>
                    <div class="box__information">
                        <p id="keeptouch">Keep Touch with Me</p>
                        <form onsubmit="buttonSubmit(event)">
                            <div class="group">
                                <label for="name"
                                    class="label__name">Nama</label>
                                <input type="text" name="name" id="name"
                                    placeholder="Masukan nama" value>
                            </div>
                            <div class="group">
                                <label for="email"
                                    class="label__name">Email</label>
                                <input type="email" name="email" id="email"
                                    placeholder="Masukan Email" value>
                            </div>
                            <div class="group">
                                <label for="pesan"
                                    class="label__name">Pesan</label>
                                <textarea name="pesan" id="pesan" value
                                    placeholder="Masukan Pesan"></textarea>
                            </div>
                            <div class="response">
                                <button type="submit">Kirim</button>
                                <p id="response"></p>
                            </div>
                        </form>
                    </div>
                     </a>
                            <a href="/v2/" class="back__to__home"><-- Back to
                                Home</a>
                </div>
            </div>
            <footer>
                <div class="footer__box">
                    <span>
                        Made With ♥️ <a
                            href="https://instagram.com/kangyann.dev ">kangyann.dev</a></span>
                    <span>Copyright &copy; 2025. All Right Reserved.</span>
                </div>
            </footer>
        </div>
    </body>
</html>
